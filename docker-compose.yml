version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: ephemeral_postgres
    restart: always
    environment:
      POSTGRES_USER: ephemeral_user
      POSTGRES_PASSWORD: ephemeral_password
      POSTGRES_DB: ephemeral_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
